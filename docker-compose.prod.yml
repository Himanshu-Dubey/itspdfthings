services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - loveupdf
    deploy:
      resources:
        limits:
          memory: 128M

  app:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
      - ./apps/api/.env.production:/var/www/html/.env
      - storage-data:/var/www/html/storage/app
    depends_on:
      - mysql
      - redis
    environment:
      - PHP_OPCACHE_ENABLE=1
    networks:
      - loveupdf
    deploy:
      resources:
        limits:
          memory: 768M

  queue-worker:
    image: loveupdf-app
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
      - ./apps/api/.env.production:/var/www/html/.env
    depends_on:
      - mysql
      - redis
    networks:
      - loveupdf
    deploy:
      resources:
        limits:
          memory: 512M

  scheduler:
    image: loveupdf-app
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
      - ./apps/api/.env.production:/var/www/html/.env
    depends_on:
      - mysql
      - redis
    networks:
      - loveupdf
    deploy:
      resources:
        limits:
          memory: 256M

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: loveupdf
      MYSQL_USER: loveupdf
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - loveupdf
    deploy:
      resources:
        limits:
          memory: 512M
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --max-connections=50

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - loveupdf

volumes:
  mysql-data:
  redis-data:
  caddy-data:
  caddy-config:
  storage-data:

networks:
  loveupdf:
    driver: bridge
